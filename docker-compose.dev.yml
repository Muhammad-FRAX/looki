services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: dev
    image: looki-api:dev
    container_name: looki-api
    volumes:
      - ./apps/api/src:/app/apps/api/src:ro
      - ./packages:/app/packages:ro
    environment:
      NODE_ENV: development
    command: ["npx", "tsx", "watch", "apps/api/src/index.ts"]

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: dev
    image: looki-web:dev
    container_name: looki-web
    volumes:
      - ./apps/web/src:/app/apps/web/src:ro
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000
