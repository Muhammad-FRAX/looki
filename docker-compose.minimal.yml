services:
  postgres:
    image: postgres:16-alpine
    container_name: looki-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-looki}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-looki}
      POSTGRES_DB: ${POSTGRES_DB:-looki}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-looki}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: looki-api:v1
    container_name: looki-api
    env_file: .env
    environment:
      NODE_ENV: development
      PORT: "3000"
      REDIS_URL: ""
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  pgdata:
    name: looki-postgres-data
