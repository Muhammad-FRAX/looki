services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-looki}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-looki}
      POSTGRES_DB: ${POSTGRES_DB:-looki}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-looki}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      JOB_RESULT_PATH: /data/jobs
    volumes:
      - jobsdata:/data/jobs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    environment:
      NODE_ENV: production
      JOB_RESULT_PATH: /data/jobs
    volumes:
      - jobsdata:/data/jobs
    command: ["node", "dist/jobs/worker.js"]
    depends_on:
      - api
    restart: unless-stopped

  data-loader:
    build:
      context: .
      dockerfile: apps/data-loader/Dockerfile
    env_file: .env
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - loader

volumes:
  pgdata: {}
  redisdata: {}
  jobsdata: {}
