services:
  postgres:
    image: postgres:16-alpine
    container_name: looki-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-looki}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-looki}
      POSTGRES_DB: ${POSTGRES_DB:-looki}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-looki}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: looki-redis
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: looki-api:v1
    container_name: looki-api
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      JOB_RESULT_PATH: /data/jobs
    volumes:
      - jobsdata:/data/jobs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    image: looki-web:v1
    container_name: looki-web
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: looki-worker:v1
    container_name: looki-worker
    env_file: .env
    environment:
      NODE_ENV: production
      JOB_RESULT_PATH: /data/jobs
    volumes:
      - jobsdata:/data/jobs
    command: ["node", "apps/api/dist/jobs/worker.js"]
    depends_on:
      - api
    restart: unless-stopped

  data-loader:
    build:
      context: .
      dockerfile: apps/data-loader/Dockerfile
    image: looki-data-loader:v1
    container_name: looki-data-loader
    env_file: .env
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - loader

volumes:
  pgdata:
    name: looki-postgres-data
  redisdata:
    name: looki-redis-data
  jobsdata:
    name: looki-jobs-data
